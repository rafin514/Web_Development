    <style>
        body {
            background-color: red;
        }

        @media only screen and (max-width:500px);
            .box{
                width: 344px;
                height: 344px;

                margin: 3px;
                padding: 3px;
            }

</head>

<body>

    <div class="boxes">

    <div class="box">4</div>
    </div>
</body>

</html>
