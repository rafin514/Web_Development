<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Shadows & Outlines</title>
    <Style>
        .box{
            border: 2px solid red;
            padding: 44px;
            box-shadow: 5px 5px 15px 5px #888888;
        }
        .text-element{
           text-shadow: 2px 2px 4px #c63333;
           outline: 5px solid blue; 
           border: 3px solid red;;
        }
    </Style>
</head>
<body>
    <div class="box">
    I am a Box
    </div>
    <p class="text-element">Lorem ipsum dolor sit amet consectetur adipisicing elit. Accusantium mollitia esse vero maxime sit! Mollitia quia praesentium voluptates debitis distinctio, reiciendis similique aliquid aut suscipit, ipsa dolorem eius atque ea quam magnam nam beatae alias.</p>
</body>
</html>
