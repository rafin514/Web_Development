<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms - Let's learn it</title>
</head>

<body>
    <h1>Form for apply to web development course - TA</h1>
    <form action="post">
        <div>
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" </div>
            <span>
                <label for="Email">Email</label>
                <input type="text" id="Email" name="Email" placeholder="Type your email here">
            </span>

            <div>
                <input type="radio" id="male" name="gender" value="male">
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female">
                <label for="female">Female</label>
            </div>
            <div>
                <input type="checkbox" id="subscribe" name="subscribe" value="yes">
                <label for="Subscribe">Subscribe to Newsletter</label>
            </div>
            <div>
                <label for="Comment">Enter your comment here:</label>
            </div>
            <div>
                <textarea id="Comment" name="Comment" rows="4" placeholder="type here..." cols="50"></textarea>
            </div>
            <div>
                <select name="fruits">
                    <option value="apple">Apple</option>
                    <option value="banana">Banana</option>
                    <option value="orange">Orange</option>
                    <option value="mango">Mango</option>
                    <option value="pineapple">Pineapple</option>
                </select>
            </div>
    </form>
</body>

</html>
