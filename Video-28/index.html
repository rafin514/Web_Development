<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position Property</title>
    <style>
*{
    margin: 0;
    padding: 0;
}
.box1{
background-color: antiquewhite;
position: sticky;
top: 0px;
height: 113px;
width: 100%;
margin: 0;
padding: 0;
}
.box2{
background-color: aqua;
position:relative;
top: 35px;
left: 25px;
}
.box3{
background-color: rgb(123, 84, 160);
position: fixed;
height: 50vh;
bottom: 0px;
left: 8vw;
}
.box4{
background-color: rgb(210, 88, 88);
position:relative;
top: 35px;
left: 25px;
}
.box{
    height: 133px;
    width: 80vw;
    padding: 3px;
    margin: 3px;
    border: 2px solid red;
}
    .parent{
        padding: 50px;
        margin: 35px;
        border: 3px solid green;
        position: absolute;
    }
    </style>
</head>
<body>
    <div class="parent">
    <div class="box box1"></div>
    <div class="box box2"></div>
    <div class="box box3"></div>
    <div class="box box4"></div>
    </div>
</body>
</html>
